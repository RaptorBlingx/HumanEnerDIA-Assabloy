version: '3.1'
intents:
- affirm
- definition
- deny
- goodbye
- greet
- process
- purpose
- requirement
- thank
responses:
  utter_ask_humenerdia_platform:
  - text: HumanEnerDIA is an intelligent energy management platform combining real-time monitoring, ML analytics, and ISO 50001 compliance. It features dashboards for baseline prediction, anomaly detection, forecasting, KPIs, plus Grafana visualizations and OVOS voice assistant.
  - text: HumanEnerDIA is a comprehensive Energy Management System (EnMS) with Analytics dashboards, 11 Grafana dashboards, voice assistant integration, and automated reporting. Navigate using the sidebar menu to access all features.
  utter_ask_portal_dashboard:
  - text: The main dashboard is your command center showing real-time energy metrics, alerts, machine status, and quick navigation to all HumanEnerDIA features via the sidebar menu.
  - text: Dashboard shows total consumption, active machines, recent anomalies, and KPI summaries. Use the left sidebar to navigate to Analytics, Visualizations, and Grafana.
  utter_ask_portal_baseline:
  - text: The Baseline page trains ML models to predict expected energy consumption based on drivers (temperature, pressure, load, production). View R², RMSE, MAE metrics and coefficient impact charts.
  - text: Baseline prediction compares actual vs expected consumption. Select a machine, choose drivers, train the model, then view the prediction chart and performance metrics.
  utter_ask_portal_anomaly:
  - text: The Anomaly Detection page identifies unusual consumption patterns using statistical analysis. View alerts by severity (Critical, Warning, Info), filter by machine and time period.
  - text: Anomalies are detected when consumption deviates significantly from expected patterns. Check severity levels, investigate root causes, and mark resolved once fixed.
  utter_ask_portal_kpi:
  - text: The KPI Dashboard displays key metrics including Energy Efficiency, Load Factor, Peak Demand, Cost Efficiency, and SEC (Specific Energy Consumption) with trend charts.
  - text: Track KPIs like load factor percentage, peak demand ratio, and efficiency ratings. Use time filters (24h, 7d, 30d) to analyze performance trends.
  utter_ask_portal_forecast:
  - text: The Forecast page predicts future demand using ARIMA (1-4h) and Prophet (24h-7d) models. Features include Optimal Load Scheduling to find best times to run equipment.
  - text: Train ARIMA for short-term or Prophet for long-term forecasts. Use Optimal Load Scheduling to minimize energy costs by finding optimal operation times.
  utter_ask_portal_reports:
  - text: Generate PDF reports for consumption summaries, KPI performance, anomaly analysis, and efficiency metrics. Export data as CSV for further analysis.
  - text: Reports include consumption totals, peak demand, efficiency metrics, baseline comparison, and anomaly summaries. Download as PDF or export data.
  utter_ask_viz_sankey:
  - text: The Sankey diagram visualizes energy flow through your facility. Flow width represents energy quantity (kWh). Identify major consumers and distribution patterns.
  - text: Read Sankey left-to-right - from sources through machines to outputs. Thicker flows indicate more energy. Helps identify losses and optimization opportunities.
  utter_ask_viz_heatmap:
  - text: The heatmap displays consumption or anomalies across hours (X-axis) and days (Y-axis). Darker colors indicate higher values. Spot patterns and outliers.
  - text: Use heatmap to identify peak consumption hours, weekend vs weekday patterns, shift schedules, and recurring anomalies.
  utter_ask_viz_comparison:
  - text: The Comparison page displays side-by-side metrics for multiple machines including consumption, peak demand, load factor, and efficiency ratings.
  - text: Compare machines to identify best/worst performers, efficiency gaps, and candidates for maintenance or upgrades.
  utter_ask_grafana_general:
  - text: HumanEnerDIA includes 11 Grafana dashboards covering Factory Overview, ISO 50001 EnPI, Anomaly Detection, Cost Analytics, and more. Access via sidebar menu.
  - text: These dashboards provide premium visualizations with ML insights. Use the machine selector to filter views. Dashboards refresh every 30-60 seconds (Real-Time is faster).
  utter_ask_grafana_factory:
  - text: Factory Overview is the Command Center showing real-time status - Active Machines, Energy Today, Cost, Anomalies, Live Power chart, and Machine Status & Health.
  - text: Factory Overview provides operational awareness with live power consumption (6h), energy by machine breakdown, and machine health indicators in one view.
  utter_ask_grafana_iso50001:
  - text: ISO 50001 EnPI tracks compliance with EnPI Score, Energy Savings, CUSUM Control Chart, Baseline vs Actual, Weather Normalization, and SEU Performance panels.
  - text: The ISO 50001 dashboard helps monitor energy performance indicators and compliance status with visualization of baseline deviations and degree-day normalization.
  utter_ask_grafana_anomaly:
  - text: Anomaly Detection shows Active/Critical Anomalies, MTTR, Severity Distribution, Timeline, Machine ranking by anomaly count, Heatmap, and Unresolved list.
  - text: Use the Anomaly dashboard to monitor alert severity, mean time to resolution, and identify which machines and hours have the most issues.
  utter_ask_grafana_cost:
  - text: Cost Analytics tracks Current Month Cost, Variance, Average Rate, Potential Savings, 12-month Trend, Time-of-Use breakdown, and Savings Opportunities.
  - text: Cost dashboard helps identify expensive energy periods, top cost contributors, and optimization opportunities for reducing electricity bills.
  utter_ask_grafana_executive:
  - text: Executive Summary provides management-level KPIs including Top Operational Concerns, 12-Month Energy Trend, and Energy Intensity (kWh per unit produced).
  - text: Executive Summary is designed for managers with high-level metrics and long-term trends without technical complexity.
  utter_ask_grafana_machine_health:
  - text: Machine Health provides deep-dive analysis with Health Score, Energy, Power, Anomalies, ML Model Performance, Baseline Variance, and Power Consumption charts.
  - text: Machine Health dashboard enables detailed analysis of individual machines including their ML model accuracy and deviation from expected baseline consumption.
  utter_ask_grafana_ml:
  - text: ML Model Performance tracks Active Models, Average R²/RMSE, score trends over time, model performance by machine, and recent training history (30d).
  - text: Use ML Performance dashboard to monitor model accuracy, identify models needing retraining, and track overall prediction quality across the facility.
  utter_ask_grafana_operational:
  - text: Operational Efficiency shows OEE (Overall Equipment Effectiveness), Availability Rate, Performance Rate, Production vs Energy correlation, and Machine Status.
  - text: Operational Efficiency tracks production metrics and correlates them with energy usage to identify optimal operating points and efficiency opportunities.
  utter_ask_grafana_predictive:
  - text: Predictive Analytics shows RMSE/MAPE/R² metrics, Forecast vs Actual comparisons, Model Performance comparisons, and accuracy trends over time.
  - text: Predictive Analytics dashboard validates forecast accuracy by comparing predictions against actual consumption and tracking error metrics.
  utter_ask_grafana_realtime:
  - text: Real-Time Production shows Factory Status, Active Machines, Current Power, and Live Power chart (last 15 minutes) with fastest refresh rate.
  - text: Real-Time Production provides instant operational awareness with sub-minute updates for monitoring current factory state and power consumption.
  utter_ask_grafana_environmental:
  - text: Environmental Impact tracks Monthly Carbon Footprint, CO2 Emissions Trend, Emission Intensity (kg CO2/unit), CO2 by Machine, and Reduction Progress.
  - text: Environmental dashboard helps monitor and reduce carbon footprint by tracking emissions, intensity metrics, and progress toward sustainability goals.
  utter_ask_ovos_capabilities:
  - text: OVOS voice assistant can query energy data, check machine status, show KPIs, generate forecasts, detect anomalies, analyze costs, and generate PDF reports using natural voice commands.
  - text: You can ask OVOS about energy consumption, machine status, forecasts, anomalies, costs, and reports. Try 'What's the energy consumption of Compressor-1?' or 'Any active alerts?'.
  utter_ask_ovos_energy:
  - text: Ask OVOS about energy by saying 'What's the energy consumption of [machine]?' or 'How much energy did [machine] use [time period]?'. OVOS understands machine names and time phrases.
  - text: For energy queries, try 'Show hourly energy consumption for HVAC-Main', 'How much power is Compressor-1 using?', or 'Compare energy between machines'.
  utter_ask_ovos_status:
  - text: Check machine status by voice with 'Is [machine] running?', 'Which machines are active?', 'Any machines offline?', or 'Give me a factory overview'.
  - text: OVOS can tell you machine health status. Try 'Is Boiler-1 running?', 'System diagnostics', or 'How many machines are active?'.
  utter_ask_ovos_kpi:
  - text: Get KPIs by saying 'Show me the KPIs for Compressor-1', 'What's the load factor?', 'Calculate SEC', or 'What's the peak demand?'.
  - text: OVOS provides load factor, SEC, peak demand, efficiency, and carbon metrics. Try 'KPIs for Boiler-1' or 'What's our carbon footprint?'.
  utter_ask_ovos_forecast:
  - text: Ask for forecasts with 'Forecast energy for tomorrow', 'What's the expected energy for Compressor-1?', or 'Show me the medium-term forecast'.
  - text: OVOS supports short-term (ARIMA) and medium-term (Prophet) forecasts. Try 'Predict consumption for HVAC-Main' or 'Train baseline for Compressor-1'.
  utter_ask_ovos_anomaly:
  - text: Check anomalies by saying 'Are there any anomalies?', 'Any active alerts?', 'What's wrong?', or 'Find issues in Compressor-1'.
  - text: OVOS detects and reports anomalies with severity levels. Try 'Any critical issues?', 'List active anomalies', or 'Check for unusual patterns'.
  utter_ask_ovos_cost:
  - text: Query costs by saying 'How much have we spent on energy?', 'Energy cost today', 'Which machine costs the most?', or 'Cost breakdown'.
  - text: OVOS provides cost analysis including per-machine costs. Try 'Energy cost this week', 'Spending on electricity', or 'Budget usage'.
  utter_ask_ovos_reports:
  - text: Generate reports by saying 'Create a monthly report', 'Generate ISO 50001 report', 'I need a PDF report', or 'Download the report'.
  - text: OVOS can generate monthly, ISO 50001 compliance, and performance reports. Say 'Generate report' and OVOS provides a download link.
  utter_ask_concept_baseline:
  - text: Energy baseline is an ML model predicting expected consumption based on drivers (temperature, load, production). Used for anomaly detection and EnPI calculation.
  - text: Baselines enable comparing actual vs expected consumption. Train with historical data, monitor R² accuracy, retrain when performance drops.
  utter_ask_concept_enpi:
  - text: EnPI (Energy Performance Indicator) = Actual/Baseline × 100. Values <100 indicate improvement. Required by ISO 50001 for tracking energy performance.
  - text: EnPI quantifies efficiency improvement vs baseline. Track trends, target 5-10% reduction, use CUSUM charts for cumulative deviation analysis.
  utter_ask_concept_sec:
  - text: SEC (Specific Energy Consumption) = kWh / units produced. Normalizes consumption for production volume. Lower SEC = more efficient production.
  - text: SEC enables fair efficiency comparison across different production volumes. Reduce by minimizing idle time and improving process parameters.
  utter_ask_concept_loadfactor:
  - text: Load Factor = Average Power / Peak Power × 100. High load factor (70-90%) indicates efficient equipment utilization and reduces demand charges.
  - text: Improve load factor by leveling production, staggering startups, and reducing peak demand spikes.
  utter_ask_concept_peakdemand:
  - text: Peak demand is maximum power (kW) during a billing period. Utilities charge separately for peaks - a single spike affects the entire month's bill.
  - text: Reduce peak demand through load shifting, staggering equipment startups, and demand response programs.
  utter_ask_concept_seu:
  - text: SEU (Significant Energy Use) is equipment with high consumption or improvement potential. ISO 50001 requires identifying and managing SEUs.
  - text: Typically 20% of equipment accounts for 80% of consumption. Focus improvement efforts on SEUs for maximum impact.
  utter_ask_concept_arima:
  - text: ARIMA is a time-series forecasting method for short-term predictions (1-4 hours). Uses past values and patterns to predict future consumption.
  - text: ARIMA works well for stable, regular patterns. Limited for seasonal data or long-term forecasts - use Prophet for those.
  utter_ask_concept_prophet:
  - text: Prophet is Facebook's forecasting model for medium-term predictions (24h-7d). Handles seasonality, holidays, and missing data automatically.
  - text: Prophet excels at capturing daily/weekly patterns. More robust than ARIMA for business data with seasonal cycles.
  utter_ask_concept_anomaly_ml:
  - text: HumanEnerDIA uses Z-score (statistical outliers), Isolation Forest (ML), and baseline deviation to detect anomalies. Severity based on magnitude and impact.
  - text: Anomalies can indicate equipment issues, process deviations, or sensor problems. Investigate root cause when detected.
  utter_ask_concept_oee:
  - text: OEE = Availability × Performance × Quality. World-class is 85%+. Low OEE correlates with poor energy efficiency due to idle time and rework.
  - text: Track each OEE component separately to identify improvement opportunities. Improving OEE typically improves SEC.
  utter_ask_concept_cusum:
  - text: CUSUM chart tracks cumulative deviation from baseline. Detects gradual efficiency degradation or sustained improvement that period-by-period analysis misses.
  - text: Upward CUSUM trend = cumulative waste. Downward trend = cumulative savings. Flat line = on target.
  utter_ask_nodered:
  - text: Node-RED is the ETL pipeline - receives MQTT sensor data, transforms/validates it, and batch-inserts to TimescaleDB. Access at port 1880.
  - text: Node-RED flows connect MQTT-in nodes → transform functions → PostgreSQL inserts. It's the data bridge between factory sensors and database.
  utter_ask_mqtt:
  - text: MQTT is the lightweight pub/sub messaging protocol transporting real-time sensor data. Broker at 172.18.0.1:1883. Topics follow factory/{id}/{machine}/{type} pattern.
  - text: MQTT receives data from factory equipment. Node-RED subscribes to topics to process and store sensor readings.
  utter_ask_timescaledb:
  - text: TimescaleDB is PostgreSQL optimized for time-series. Uses hypertables (auto-partitioned) and continuous aggregates (_1min, _1hour, _1day) for fast queries.
  - text: Query continuous aggregates for aggregated data, not raw hypertables. Access via: docker exec -it enms-postgres psql -U $POSTGRES_USER -d enms.
  utter_ask_analytics_api:
  - text: Analytics API (FastAPI, port 8001) provides ML/KPI endpoints - baseline training, anomaly detection, forecasting, KPIs, reports. Swagger docs at /docs.
  - text: Analytics handles all ML operations. Key endpoints: /baseline/*, /anomaly/*, /kpi/*, /forecast/*, /reports/*.
  utter_ask_simulator:
  - text: Simulator (port 8003) generates realistic factory sensor data - energy, production, environmental. Simulates 5 machine types with variable intervals.
  - text: Check status: curl localhost:8003/simulator/status. Control via POST /simulator/start, /simulator/stop.
  utter_ask_docker:
  - text: Services via docker-compose: postgres (5432), analytics (8001), simulator (8003), nodered (1880), grafana (3000), nginx (8080 gateway), redis.
  - text: Start all: docker-compose up -d. Restart one: docker-compose restart [service]. Logs: docker-compose logs -f [service].
  utter_ask_redis:
  - text: Redis provides caching (300s TTL for expensive queries) and pub/sub for real-time WebSocket events like anomaly.detected, baseline.trained.
  - text: Disable pub/sub with REDIS_PUBSUB_ENABLED=false in .env if WebSocket not needed.
  utter_greet:
  - text: Hello! I'm here to help you with questions about the Energy Management System (EnMS) based on ISO 50001:2011. How can I assist you today?
  - text: Hi! I can answer questions about Energy Management Systems. What would you like to know?
  - text: Greetings! I'm your Energy Management System assistant. What can I help you with?
  utter_goodbye:
  - text: Goodbye! Feel free to come back if you have more questions about Energy Management Systems.
  - text: See you later! Have a great day!
  - text: Farewell! I'm here whenever you need help with EnMS questions.
  utter_thank:
  - text: You're welcome! Is there anything else you'd like to know?
  - text: Happy to help! Do you have any other questions?
  - text: My pleasure! Feel free to ask if you need more information.
  utter_affirm:
  - text: Great! How can I help you further?
  - text: Understood! What would you like to know?
  - text: Perfect! Is there anything else you need?
  utter_deny:
  - text: No problem! Is there something else I can help you with?
  - text: Understood. How else can I assist you?
  - text: That's fine. What would you like to know?
  utter_ask_management_responsibility:
  - text: Top management must demonstrate its commitment to support the EnMS and to continually improve its effectiveness. This involves defining, establishing, implementing, and maintaining an energy policy, and ensuring that appropriate energy objectives and targets are established. Top management must provide necessary resources including human resources, specialized skills, technology, and financial resources.
  - text: 'Management responsibility includes: demonstrating commitment to EnMS, providing necessary resources (human, skills, technology, financial), ensuring energy performance is considered in long-term planning, communicating the importance of energy management, and appointing a management representative with appropriate skills and competence.'
  utter_ask_energy_policy:
  - text: The energy policy must state the organization's commitment to achieving continual improvement in energy performance. It must include a commitment to ensure the availability of necessary resources and information needed to achieve established objectives and targets. Finally, it must include a commitment to comply with applicable legal requirements and any other requirements related to energy use, consumption, and efficiency. The policy must be documented and communicated at all levels within the organization.
  - text: The energy policy provides the essential framework for setting and reviewing energy objectives and targets. It must support the purchase of energy-efficient products and services, and promote design practices that aim for energy performance improvement. The policy must be regularly reviewed by top management and updated as necessary.
  utter_ask_energy_planning:
  - text: The organization must conduct and document an energy planning process that is consistent with its energy policy. The overall goal is that this process shall lead to activities that continually improve energy performance. This planning process results in the creation of key outputs, including the Energy Baseline, EnPIs, Objectives, Targets, and Action Plans.
  - text: 'Energy planning involves: identifying and maintaining access to applicable legal requirements, conducting an energy review to analyze energy use and consumption, identifying significant energy uses, establishing energy baselines, identifying EnPIs, and setting objectives and targets with action plans.'
  utter_ask_energy_baseline:
  - text: The energy baseline serves as a quantitative reference or set of references that provides a basis for comparing and measuring energy performance. This baseline reflects a specified period of time and may be adjusted or normalized using variables that affect energy consumption, such as the production level or outdoor temperature (degree days).
  - text: The organization shall establish one or more energy baselines using the information derived from the initial energy review. A suitable data period for the baseline means that the organization must account for regulatory requirements or variables that affect energy use and consumption. Adjustments to the energy baseline(s) must be made if EnPIs no longer reflect organizational energy use and consumption, or if there have been major changes to the process, operational patterns, or energy systems.
  utter_ask_enpi:
  - text: EnPIs (Energy Performance Indicators) are identified to be appropriate for monitoring and measuring the organization's energy performance. They can range from a simple parameter or ratio to a complex model, such as energy consumption per unit of production. The organization must record and regularly review the methodology used for determining and updating the EnPIs.
  - text: Energy Performance Indicators (EnPIs) are quantitative values or measures of energy performance. EnPIs can be expressed as a simple metric, a ratio, or a more complex model. The methodology for determining and updating the EnPIs shall be recorded and regularly reviewed.
  utter_ask_objectives_targets:
  - text: The established energy objectives and targets must be consistent with the organization's energy policy. When establishing and reviewing objectives and targets, the organization must consider legal requirements and other subscribed requirements, the identified significant energy uses, and the opportunities to improve energy performance revealed in the energy review. Additionally, it must consider its financial, operational, and business conditions, the available technological options, and the views of interested parties.
  - text: Energy objectives are specified outcomes set to meet the organization's energy policy related to improved energy performance. Energy targets are detailed and quantifiable energy performance requirements that arise from the energy objective and must be met to achieve that objective. Both must be consistent with the energy policy.
  utter_ask_action_plans:
  - text: 'The action plans established to achieve the objectives and targets must be documented and include four essential elements: designation of responsibility, the means and time frame by which individual targets are to be achieved, a statement of the method by which an improvement in energy performance shall be verified, and a statement of the method of verifying the results.'
  - text: 'Action plans must include: designation of responsibility, the means and time frame by which individual targets are to be achieved, a statement of the method by which an improvement in energy performance shall be verified, and a statement of the method of verifying the results. Action plans shall be documented and updated at defined intervals.'
  utter_ask_implementation:
  - text: The organization must ensure that any person working for or on its behalf, especially concerning significant energy uses, is competent based on an appropriate combination of education, training, skills, or experience. Personnel must be aware of the importance of conformity with the energy policy, procedures, and the requirements of the EnMS. The organization must establish and implement a process that allows any person working for or on its behalf to make comments or suggest improvements to the EnMS.
  - text: 'Implementation and operation involves: ensuring personnel competence, awareness, and training; establishing internal and external communication processes; creating and maintaining EnMS documentation; establishing operational controls for significant energy uses; considering energy performance in design; and establishing procurement criteria for energy-using products.'
  utter_ask_checking:
  - text: 'At a minimum, the key characteristics that must be monitored, measured, and analyzed are: the significant energy uses and other outputs of the energy review, the relevant variables related to significant energy uses, the Energy Performance Indicators (EnPIs), the effectiveness of the action plans in achieving objectives and targets, and the evaluation of actual versus expected energy consumption.'
  - text: The organization must ensure that the equipment used in monitoring and measurement provides data that are accurate and repeatable. Records of calibration and other means used to establish this accuracy and repeatability must be maintained. When significant deviations in energy performance are identified, the organization must investigate and respond to these deviations.
  utter_ask_internal_audit:
  - text: The internal audit, conducted at planned intervals, must ensure that the EnMS conforms to the planned arrangements for energy management, including the requirements of this International Standard. It must also confirm that the system conforms with the established energy objectives and targets, and that it is effectively implemented and maintained, leading to improved energy performance.
  - text: Internal audits can be performed either by personnel from within the organization or by external persons selected by the organization. The auditors must be competent and in a position to perform the audit impartially and objectively. Records of the audit results shall be maintained and reported to top management.
  utter_ask_corrective_preventive_action:
  - text: 'When addressing nonconformities, the organization must perform six actions: reviewing nonconformities or potential nonconformities; determining their causes; evaluating the need for action to ensure the nonconformities do not occur or recur; determining and implementing the appropriate needed action; maintaining records of these actions; and finally, reviewing the effectiveness of the corrective or preventive action taken.'
  - text: Corrective actions and preventive actions must be appropriate to the magnitude of the actual or potential problems encountered and the resulting energy performance consequences. The organization must ensure that any necessary changes are made to the Energy Management System following the determination and implementation of corrective or preventive actions.
  utter_ask_management_review:
  - text: "Top management shall review the organization's EnMS at planned intervals. The primary purpose is to ensure the system's continuing suitability, adequacy, and effectiveness. The inputs must include: follow-up actions from previous management reviews, the status of corrective actions and preventive actions, EnMS audit results, a review of energy performance and related EnPIs, the extent to which energy objectives and targets have been met, and projected energy performance for the following period."
  - text: "The outputs from the management review must include any decisions or actions related to: changes to the energy policy, changes to the allocation of resources, changes in the energy performance of the organization, changes to the EnPIs, and changes to objectives, targets, or other elements of the EnMS, ensuring consistency with the organization's commitment to continual improvement."
  utter_ask_definitions:
  - text: Continual improvement is a recurring process that results in the enhancement of both the energy performance and the overall Energy Management System (EnMS). Energy refers to various media such as electricity, fuels, steam, heat, and compressed air. Energy efficiency is defined as a ratio or other quantitative relationship between an output and an input of energy. Energy performance refers to measurable results related to energy efficiency, energy use, and energy consumption.
  - text: A significant energy use is an energy use that accounts for substantial energy consumption or offers a considerable potential for improving energy performance. The energy baseline is a quantitative reference providing a basis for comparing and measuring energy performance. An energy objective is a specified outcome set to meet the organization's energy policy, while an energy target is a detailed and quantifiable energy performance requirement.
  utter_ask_scope:
  - text: The primary objective of this International Standard is to specify the requirements for establishing, implementing, maintaining, and improving an energy management system, which is intended to enable an organization to follow a systematic approach in achieving continual improvement of energy performance. This International Standard is applicable to all variables affecting energy performance that the organization can monitor and influence.
  - text: An organization can use this International Standard for the certification, registration, and self-declaration of its Energy Management System (EnMS). The application of this International Standard is intended to be applicable to all types and sizes of organizations, irrespective of geographical, cultural, or social conditions.
  utter_ask_pdca:
  - text: The International Standard is fundamentally based on the Plan - Do - Check - Act (PDCA) framework for continual improvement. Plan involves conducting the energy review, establishing the energy baseline, EnPIs, objectives, targets, and action plans. Do involves implementing the energy management action plans. Check requires monitoring and measuring processes and key operational characteristics against the policy and objectives. Act requires taking actions to continually improve both energy performance and the EnMS.
  - text: 'The EnMS model is based on the Plan – Do – Check – Act (PDCA) continual improvement framework. Plan: energy review, baseline, EnPIs, objectives, targets, action plans. Do: implement action plans. Check: monitor, measure, analyze. Act: continual improvement of energy performance and EnMS.'
  utter_ask_terms_definitions:
  - text: Boundaries are the physical or site limits and/or organizational limits as defined by the organization. Continual improvement is a recurring process which results in enhancement of energy performance and the energy management system. Correction is the action to eliminate a detected nonconformity. Corrective action is taken to eliminate the cause of a detected nonconformity, whereas preventive action is taken to eliminate the cause of a potential nonconformity.
  - text: Energy consumption is the quantity of energy applied. Energy efficiency is a ratio or other quantitative relationship between an output of performance, service, goods or energy, and an input of energy. Energy use is the manner or kind of application of energy, such as ventilation, lighting, heating, cooling, transportation, processes, and production lines.
  utter_ask_energy_review:
  - text: The energy review is the determination of the organization's energy performance based on data and other information, which ultimately leads to the identification of opportunities for improvement. The energy review must analyze energy use and consumption based on measurement and other data. This analysis must include identifying the current energy sources used and evaluating both past and present energy use and consumption.
  - text: The organization must develop, record, and maintain an energy review. Based on the analysis, the organization must identify the areas of significant energy use, identify other relevant variables affecting significant energy uses, determine current energy performance, estimate future energy use and consumption, and identify, prioritize, and record opportunities for improving energy performance. The energy review must be updated at defined intervals and in response to major changes.
  utter_ask_significant_energy_use:
  - text: A significant energy use is defined as an energy use that accounts for substantial energy consumption or offers a considerable potential for improving energy performance. The specific criteria used to determine what qualifies as 'significant' must be determined by the organization itself. The organization must identify the facilities, equipment, systems, processes, and personnel working for or on behalf of the organization that significantly affect energy use and consumption.
  - text: Significant energy use (SEU) is an energy use accounting for substantial energy consumption and/or offering considerable potential for energy performance improvement. The significance criteria are determined by the organization. The organization must identify areas of significant energy use based on the analysis of energy use and consumption.
  utter_ask_legal_requirements:
  - text: The organization shall identify, implement, and maintain access to the applicable legal requirements and other requirements related to its energy use, consumption, and efficiency. It must determine how these requirements apply and ensure they are considered when establishing, implementing, and maintaining the EnMS. These requirements must be reviewed at defined intervals.
  - text: The organization must identify, implement, and have access to applicable legal requirements and other requirements related to its energy use, consumption and efficiency. The organization shall ensure that these requirements are considered in establishing, implementing and maintaining the EnMS. Legal requirements and other requirements shall be reviewed at defined intervals.
  utter_ask_procurement:
  - text: When procuring services, products, and equipment that have, or can have, an impact on significant energy use, the organization must inform suppliers that the procurement is partially evaluated on the basis of energy performance. The organization must establish and implement specific criteria for assessing energy use, consumption, and efficiency over the planned or expected operating lifetime when procuring energy-using products, equipment, and services.
  - text: Procurement is considered an opportunity to improve energy performance through the use of more efficient products and services. Energy purchasing specification elements could potentially include specifications for energy quality, availability, cost structure, environmental impact, and the potential use of renewable sources.
  utter_ask_documentation:
  - text: The EnMS documentation must include the scope and boundaries of the EnMS, the energy policy, the energy objectives, targets, and action plans. It must also include all documents, including records, that are explicitly required by this International Standard, as well as any other documents the organization determines to be necessary. Documentation can be maintained in paper, electronic or any other medium.
  - text: 'The required degree of documentation can vary among organizations due to several factors: the scale of the organization and the type of activities performed, the complexity of the processes and their interactions, and the competence of the personnel involved. The organization must establish procedures to approve documents for adequacy prior to issue and periodically review and update them.'
  utter_ask_records:
  - text: The organization shall establish and maintain records as necessary to demonstrate conformity to the requirements of its EnMS and of this International Standard. Records are also necessary to demonstrate the energy performance results achieved. The organization must define and implement controls for the identification, retrieval, and retention of records. Records must be and shall remain legible, identifiable, and traceable to the relevant activity.
  - text: A record is a document that either states the results achieved or provides evidence of activities performed. Records are used to provide evidence of verification, traceability, preventive action, and corrective action. Records shall be and shall remain legible, identifiable and traceable to the relevant activity.
  utter_ask_competence_training:
  - text: The organization must ensure that any person working for or on its behalf, especially concerning significant energy uses, is competent based on an appropriate combination of education, training, skills, or experience. The organization must maintain appropriate records of training and other actions taken to meet the identified training needs.
  - text: Personnel must be aware of the importance of conformity with the energy policy, procedures, and the requirements of the EnMS. They must understand their roles, responsibilities, and authorities in achieving EnMS requirements. They must be aware of the benefits of improved energy performance and the actual or potential impact of their activities on energy use and consumption.
  utter_ask_communication:
  - text: The organization must communicate internally regarding its energy performance and EnMS, scaling the communication appropriately to the organization's size. Furthermore, the organization is required to establish and implement a process that allows any person working for or on its behalf to make comments or suggest improvements to the EnMS.
  - text: The organization must decide whether to communicate externally about its energy policy, EnMS, and energy performance, and this decision must be documented. If the organization decides to communicate externally, it must establish and implement a defined method for this external communication.
  utter_ask_operational_control:
  - text: The primary objective of operational control is to ensure that operations and maintenance activities related to significant energy uses are carried out under specified conditions and are consistent with the energy policy, objectives, targets, and action plans. This is achieved by establishing and setting criteria for the effective operation and maintenance of significant energy uses.
  - text: Criteria for the effective operation and maintenance of significant energy uses must be established where their absence could lead to a significant deviation from effective energy performance. The organization must operate and maintain facilities, processes, systems, and equipment in accordance with these operational criteria.
  utter_ask_design:
  - text: The organization must consider energy performance improvement opportunities and operational control when designing new, modified, or renovated facilities, equipment, systems, and processes that have the potential to significantly impact its energy performance. The results of the energy performance evaluation must be incorporated, where appropriate, into the specification, design, and procurement activities of the relevant projects.
  - text: The organization shall consider energy performance improvement opportunities and operational control in the design of new facilities and equipment. The results of the design activity shall be recorded. The results of the energy performance evaluation shall be incorporated where appropriate into the specification, design and procurement activities.
  utter_ask_monitoring_measurement:
  - text: 'At a minimum, the key characteristics that must be monitored, measured, and analyzed are: the significant energy uses and other outputs of the energy review, the relevant variables related to significant energy uses, the Energy Performance Indicators (EnPIs), the effectiveness of the action plans in achieving objectives and targets, and the evaluation of actual versus expected energy consumption.'
  - text: An energy measurement plan, appropriate to the size and complexity of the organization, shall be defined and implemented. The equipment must provide data which are accurate and repeatable. Records of calibration and other means of establishing accuracy and repeatability shall be maintained.
  utter_ask_compliance:
  - text: The organization shall evaluate compliance with legal requirements and other requirements to which it subscribes, related to energy use and consumption, at planned intervals. The organization must maintain records of the results of these evaluations of compliance.
  - text: The organization shall evaluate compliance at planned intervals. Records of the results of the evaluations of compliance shall be maintained. The inputs to the management review must include a review of the results of the evaluation of compliance with legal requirements.
  utter_ask_benchmarking:
  - text: Benchmarking is defined as the process of collecting, analyzing, and relating energy performance data of comparable activities to evaluate and compare performance either between or within entities. Provided that relevant and accurate data are available, benchmarking offers a valuable input to the objective energy review and the subsequent setting of energy objectives and targets.
  - text: Different types of benchmarking exist, including internal benchmarking, which aims to highlight good practices within the organization. External benchmarking aims to establish the 'best in industry/sector' performance for an installation, facility, product, or service within the same field or sector.
  utter_ask_iso_standards:
  - text: This International Standard is based on the common elements of ISO management system standards. This foundational approach ensures a high level of compatibility, notably with standards such as ISO 9001 and ISO 14001. It can also be aligned or integrated with other management systems, including those related to quality, the environment, and occupational health and safety.
  - text: The standard, ISO 50001:2011, was published as the First edition on June fifteenth, two thousand eleven. The relationship and correspondence between ISO 50001:2011 and ISO 9001:2008, ISO 14001:2004, and ISO 22000:2005 are explicitly shown in Annex B.
  utter_ask_general_info:
  - text: 'The concept of energy performance includes three key aspects: energy use, energy efficiency, and energy consumption. This allows the organization a wide range of activities through which to demonstrate performance improvement. For instance, an organization could focus on reducing peak demand, utilizing surplus or waste energy, or improving the operations of its systems, processes, or equipment.'
  - text: The organization determines the rate, extent, and timescale of the continual improvement process. The organization has the flexibility to take into account economic and other considerations when making these determinations. The worldwide application of this International Standard is intended to contribute to the more efficient use of available energy sources, leading to enhanced competitiveness for organizations.
