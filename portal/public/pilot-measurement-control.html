<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HumanEnerDIA Pilot Measurement Control</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #020617;
            color: #e2e8f0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .control-note {
            padding: 18px;
            max-width: 380px;
        }

        .control-note h1 {
            font-size: 18px;
            margin: 0 0 8px;
        }

        .control-note p {
            color: #94a3b8;
            line-height: 1.45;
            font-size: 13px;
            margin: 0 0 8px;
        }
    </style>
    <script>
        if (!localStorage.getItem('humanenerdia_pilot_mode')) {
            localStorage.setItem('humanenerdia_pilot_mode', 'manual');
        }
    </script>
</head>
<body>
    <div class="control-note">
        <h1>Pilot Measurement Control</h1>
        <p>Keep this window visible when the main recording window is on Grafana or another page that cannot load the HumanEnerDIA recorder.</p>
        <p>Use <strong>+Click</strong> and <strong>+Screen</strong> for Grafana actions that cannot be counted automatically.</p>
    </div>
    <script src="/js/pilot-measurement.js?v=2026051301"></script>
</body>
</html>
